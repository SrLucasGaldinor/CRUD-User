<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head> <link rel="stylesheet" href="/CRUD-User/target/Front-end/css/style.css">
<body>
    <h1>Login Demo</h1>
    <p></p>
    <form id="login-form" action="/Login" method="post">
        <div class="login-group">
            <label for="email">Your E-mail</label> 
            <input type="email" 
            id="email"
            name="email" 
            placeholder="example@gmail.com"
            required/>
        </div>

        <div class="login-group">
            <label for="password">Your password</label> 
            <input type="password"
                   id="password"
                   name="password"
                   placeholder="Minimum 10 characters"
                   required/>

            <button type="button" id="btn-eye"
                    style="position: absolute; right: 10px; border: none; background: none; font-size: 25px; ">👁️</button>
        </div>

        <button class="submit">Log in</button>
        
        <div class="remember-me"><label>  <input type="checkbox" id="remember me" name="remember me" value="yes"></label>
        <label for="remember me">Remember me</label></div>

        <div class="login-group"><p>Don't have a Account?
            <a href="/CRUD-User/target/Front-end/html/register.html"> Register Now</a>
        </p></div>
        </form>
        <script src="/CRUD-User/target/Front-end/js/script.js"></script>
</body>
</html>
