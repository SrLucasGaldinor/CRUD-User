<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Register</title>
    </head> <link rel="stylesheet" href="/CRUD-User/target/Front-end/css/style.css">
    <body>
        <h1>Register on our website!</h1>
        <p></p>
        
        <form action="/Register" method="post">
        
            <div class="register-group">
                <label for="name">Full Name</label>
                <input type="text"
                 name="name"
                 id="name"
                 placeholder="your name here!"
                 required>    
        </div>
        
        <div class="register-group">
        <label for="cpf">Please provide your CPF (Brazilian tax identification number).</label>
        <input type="number"
        name="cpf"
        id="cpf"
        placeholder="your CPF"
        required>    
    </div>
    
    <div class="register-group">
        <label for="phone">Your Phone number</label>
        <input type="tel"
        name="phone"
        id="phone"
        placeholder="(99)99999-9999"
        required>
    </div>
    
    <div class="register-group">
        <label for="email">Enter a valid e-mail address.</label>
        <input type="email"
        name="email"
        id="email"
        placeholder="example@gmail.com"
        required>
    </div>
    
    <div class="register-group">
        <label for="confirm-email">Enter a valid e-mail address.</label>
        <input type="confirm-email"
        name="email"
        id="confirm-email"
        placeholder="example@gmail.com"
        required>
    </div>
    
    <div class="register-group">
        <label for="password">Enter a password.</label>
        <input type="password"
        name="password"
        id="password"
        placeholder="password"
        minlength="10"
        required>
    </div>
    
    <div class="register-group">
        <label for="confirm-password">confirm password</label>
        <input type="password"
        name="confirm-password"
        id="confirm-password"
        placeholder="password"
        minlength="10"
        required>
    </div>
    <div class="register-group">
        <button class="submit">Register</button></div>
        
        <div class="register-group">
            <a href="/CRUD-User/target/Front-end/html/index.html">I have a account</a></div>
        </form>
        </div> <div id="msg-feedback"></div>
        <script src="/CRUD-User/target/Front-end/js/script.js"></script>
    </body>
    </html>
